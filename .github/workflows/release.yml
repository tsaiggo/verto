# Build the Verto desktop app for macOS (Apple silicon + Intel) and Windows
# on every pushed tag of the form `v*` and publish the installers to a GitHub
# Release. `tauri-action` also generates `latest.json` — the manifest
# that the in-app updater fetches from
# https://github.com/<owner>/<repo>/releases/latest/download/latest.json
#
# Required repository secrets:
#   TAURI_SIGNING_PRIVATE_KEY           generated with `npx tauri signer generate`
#   TAURI_SIGNING_PRIVATE_KEY_PASSWORD  password used when generating the key
#
# The matching **public** key must be pasted into
# `src-tauri/tauri.conf.json` → `plugins.updater.pubkey` before the
# first release; otherwise the updater will refuse to install signed
# packages.

name: release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: build (${{ matrix.platform }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest # Apple silicon
            args: "--target aarch64-apple-darwin"
          - platform: macos-latest # Intel
            args: "--target x86_64-apple-darwin"
          - platform: windows-latest # Windows x64 (host target)
            args: ""

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      # Pin Rust to 1.95.0: time v0.3.48 introduced `impl ModifierValue for
      # HourBase` / `impl From<HourBase>` that conflict with tauri-utils 2.x
      # blanket From impls, producing E0119 coherence errors. The root fix is
      # the `time = ">=0.3, <0.3.48"` constraint in src-tauri/Cargo.toml (and
      # the accompanying Cargo.lock). Rust 1.95 is kept as a belt-and-suspenders
      # guard against any Rust-version-specific coherence strictness in 1.96+.
      - name: Install Rust (1.95.0)
        uses: dtolnay/rust-toolchain@1.95.0
        with:
          # Build both arches on macOS (Apple silicon + Intel); on Windows
          # the default host target (x86_64-pc-windows-msvc) is used.
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Cache cargo
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install JS deps
        run: npm ci

      - name: Generate placeholder icons if none committed
        shell: bash
        run: |
          # tauri-cli's `icon` command writes icon.ico / icon.icns plus
          # the platform PNG set into src-tauri/icons/. Use icon.ico as
          # the sentinel because every platform build needs it.
          if [ ! -f src-tauri/icons/icon.ico ]; then
            echo "No icons checked in — generating from icon.png"
            npx --yes @tauri-apps/cli icon icon.png
          fi

      - name: Prepare Tauri signing secrets
        shell: bash
        env:
          TAURI_SIGNING_PRIVATE_KEY_SECRET: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD_SECRET: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: |
          python - <<'PY'
          import os
          import pathlib
          import sys
          import uuid

          key = os.environ.get("TAURI_SIGNING_PRIVATE_KEY_SECRET", "")
          password = os.environ.get("TAURI_SIGNING_PRIVATE_KEY_PASSWORD_SECRET", "")

          if not key or not password:
              print("::warning::TAURI signing skipped: TAURI_SIGNING_PRIVATE_KEY/TAURI_SIGNING_PRIVATE_KEY_PASSWORD not both set.")
              sys.exit(0)

          key = key.replace("\r\n", "\n").replace("\r", "\n")
          if "\n" not in key and "\\n" in key:
              key = key.replace("\\n", "\n")

          key_path = pathlib.Path(os.environ["RUNNER_TEMP"]) / f"tauri-signing-private-{uuid.uuid4().hex}.key"
          fd = os.open(key_path, os.O_CREAT | os.O_EXCL | os.O_WRONLY, 0o600)
          with os.fdopen(fd, "w", encoding="utf-8") as key_file:
              # Tauri's signer expects the secret key file to end with a single newline.
              key_file.write(key.rstrip("\n") + "\n")

          with open(os.environ["GITHUB_ENV"], "a", encoding="utf-8") as fh:
              fh.write(f"TAURI_SIGNING_PRIVATE_KEY_PATH={key_path.as_posix()}\n")
              fh.write("TAURI_SIGNING_PRIVATE_KEY_PASSWORD<<EOF\n")
              fh.write(password)
              fh.write("\nEOF\n")
          PY

      - name: Check GitHub OAuth client id is wired up
        shell: bash
        env:
          NEXT_PUBLIC_VERTO_GITHUB_CLIENT_ID: ${{ vars.VERTO_GITHUB_CLIENT_ID }}
        run: |
          # The client id is a *public* value, but we still avoid printing it
          # verbatim. Report only whether the Actions Variable reached the
          # build and how long it is, so a missing/empty variable is obvious
          # in the logs without leaking anything sensitive.
          value="${NEXT_PUBLIC_VERTO_GITHUB_CLIENT_ID:-}"
          if [ -z "$value" ]; then
            echo "::warning::VERTO_GITHUB_CLIENT_ID is EMPTY at build time. The shipped app will report 'Missing GitHub OAuth client id.' Set a repository Actions Variable named VERTO_GITHUB_CLIENT_ID (Settings → Secrets and variables → Actions → Variables)."
          else
            echo "VERTO_GITHUB_CLIENT_ID is set (length=${#value})."
          fi

      - name: Build & publish
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Public OAuth App client id baked into the build so the shipped
          # installers can start the GitHub device-flow sign-in out of the
          # box. This is a *public* value (no secret), so it lives in an
          # Actions Variable rather than a Secret. Set it under
          # Settings → Secrets and variables → Actions → Variables.
          NEXT_PUBLIC_VERTO_GITHUB_CLIENT_ID: ${{ vars.VERTO_GITHUB_CLIENT_ID }}
          TAURI_SIGNING_PRIVATE_KEY_PATH: ${{ env.TAURI_SIGNING_PRIVATE_KEY_PATH }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ env.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "Verto ${{ github.ref_name }}"
          releaseBody: "See the assets below to download and install."
          releaseDraft: true
          prerelease: false
          includeUpdaterJson: true
          # Windows ships both MSI and NSIS bundles; point the updater
          # manifest at the NSIS `-setup.exe`, the target Tauri's updater
          # supports on Windows. Ignored by the macOS legs.
          updaterJsonPreferNsis: true
          args: ${{ matrix.args }}

      - name: Remove temporary Tauri signing key
        if: ${{ always() }}
        shell: bash
        run: |
          if [ -n "$TAURI_SIGNING_PRIVATE_KEY_PATH" ] && [ -f "$TAURI_SIGNING_PRIVATE_KEY_PATH" ]; then
            rm -f -- "$TAURI_SIGNING_PRIVATE_KEY_PATH"
          fi
