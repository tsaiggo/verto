# Build the Verto desktop app for macOS / Windows / Linux on every push
# to `main` and publish the installers to a rolling GitHub prerelease
# tagged `nightly`. This gives anyone a stable download URL pointing to
# the latest main build, e.g.
# https://github.com/<owner>/<repo>/releases/download/nightly/<asset>
#
# Tag/`v*` builds are handled by release.yml — this workflow is only
# for the rolling "latest main" channel and never touches versioned
# releases.
#
# Notes:
# - We reuse the same TAURI_SIGNING_* secrets as release.yml so the
#   in-app updater can still verify nightly bundles if you ever point
#   it at this channel. If the secrets are not set the build still
#   succeeds, the bundles just won't be signed.
# - Docs-only / content-only changes are skipped via `paths-ignore`.
# - `concurrency` cancels an in-flight nightly when a newer commit
#   lands on main, so we don't waste runner minutes on stale SHAs.

name: nightly

on:
  push:
    branches:
      - main
    paths-ignore:
      - '**/*.md'
      - 'docs/**'
      - 'content/**'
      - '.gitignore'
      - 'LICENSE'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: nightly-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Refresh the rolling `nightly` release metadata BEFORE the build legs
  # run. tauri-action only overwrites assets on an existing release — it
  # never moves the `nightly` git tag and never refreshes the release
  # body/title/published time. That made the Releases page look frozen on
  # an old commit even though the assets were current. This job makes the
  # `nightly` tag point at the commit being built and rewrites the release
  # body/timestamp so the page reflects the latest `main` build.
  #
  # It runs once (it is not part of the build matrix), so there is no race
  # between the four serialized build legs all trying to rewrite the same
  # body. The build legs then `needs: prepare` and only touch assets.
  prepare:
    name: prepare rolling nightly release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    # Expose the computed nightly version so every build leg stamps the
    # SAME version. The in-app updater compares the `version` in
    # `latest.json` against the running app via semver — it ignores tags,
    # commits and timestamps. If the version never changes, `check()`
    # always reports "up to date" even when the binaries differ. We mint a
    # strictly-increasing prerelease version (`<base>-nightly.<UTC stamp>`)
    # once here so all four legs agree and the updater can actually detect
    # the new build.
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Compute nightly version
        id: version
        run: |
          set -euo pipefail
          # Base version from package.json (drives tauri.conf.json's
          # "version": "../package.json"). Strip any existing prerelease so
          # repeated nightly runs don't nest `-nightly` suffixes.
          base=$(node -p "require('./package.json').version")
          base="${base%%-*}"
          # A UTC timestamp is a monotonically increasing numeric semver
          # prerelease identifier, so each nightly sorts strictly above the
          # previous one regardless of when the matrix legs run.
          stamp=$(date -u '+%Y%m%d%H%M%S')
          version="${base}-nightly.${stamp}"
          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "Nightly version: ${version}"

      - name: Point `nightly` tag at this commit and refresh release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          COMMIT_SHA: ${{ github.sha }}
          NIGHTLY_VERSION: ${{ steps.version.outputs.version }}
        run: |
          set -euo pipefail

          # Move the lightweight `nightly` tag to the commit being built so
          # the Releases page (and `git ls-remote --tags origin nightly`)
          # report the current SHA instead of a stale one.
          git tag -f nightly "${COMMIT_SHA}"
          git push -f origin "refs/tags/nightly"

          body=$(cat <<EOF
          Automated build from the latest \`main\` branch.

          Version: ${NIGHTLY_VERSION}
          Commit: ${COMMIT_SHA}
          Built: $(date -u '+%Y-%m-%dT%H:%M:%SZ')

          ⚠️ This is an unstable rolling build — use the tagged
          releases for production. Assets here are overwritten on
          every push to \`main\`.
          EOF
          )

          # Create the release if it doesn't exist yet, otherwise refresh
          # its target commit, title and body so the metadata is current.
          # Assets are uploaded later by the build legs.
          if gh release view nightly >/dev/null 2>&1; then
            gh release edit nightly \
              --target "${COMMIT_SHA}" \
              --title "Verto nightly (main)" \
              --notes "${body}" \
              --prerelease

            # Bundle filenames now embed the version (e.g.
            # Verto_<version>_aarch64.dmg), so they change every run and
            # would otherwise pile up on the rolling release. Clear the old
            # assets here — before any build leg uploads — so only the
            # current run's artifacts remain. `latest.json` is re-created by
            # the build legs, so removing it too is safe.
            gh release view nightly --json assets \
              --jq '.assets[].name' | while IFS= read -r asset; do
              [ -n "${asset}" ] || continue
              gh release delete-asset nightly "${asset}" -y || true
            done
          else
            gh release create nightly \
              --target "${COMMIT_SHA}" \
              --title "Verto nightly (main)" \
              --notes "${body}" \
              --prerelease
          fi

  build:
    name: build (${{ matrix.platform }} ${{ matrix.args }})
    needs: prepare
    strategy:
      fail-fast: false
      # Run the matrix legs one at a time. All four builds publish to the
      # same rolling `nightly` release, and tauri-action deletes any
      # existing same-named asset before re-uploading. When the legs run
      # in parallel they race on those delete/upload calls — one job
      # removes an asset another is about to delete, and GitHub then
      # returns `404 Not Found` on the delete-release-asset API, failing
      # the job. Serializing the legs makes each one the sole writer of
      # the release at any given moment, which removes the race.
      max-parallel: 1
      matrix:
        include:
          - platform: macos-latest # Apple silicon
            args: '--target aarch64-apple-darwin'
          - platform: macos-latest # Intel
            args: '--target x86_64-apple-darwin'
          - platform: ubuntu-22.04
            args: ''
          - platform: windows-latest
            args: ''

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux build deps
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable
        with:
          # Build both arches on macOS, otherwise the host target.
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Cache cargo
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install JS deps
        run: npm ci

      - name: Stamp nightly version
        shell: bash
        env:
          NIGHTLY_VERSION: ${{ needs.prepare.outputs.version }}
        run: |
          set -euo pipefail
          # tauri.conf.json sets "version": "../package.json", so the app /
          # bundle / latest.json version is taken from package.json. Stamp
          # the shared version computed in `prepare` here (in every leg's
          # fresh checkout) so all platforms publish the same version and
          # the updater can detect it. Not committed — build-time only.
          npm version "$NIGHTLY_VERSION" --no-git-tag-version --allow-same-version

      - name: Generate placeholder icons if none committed
        shell: bash
        run: |
          if [ ! -f src-tauri/icons/icon.ico ]; then
            echo "No icons checked in — generating from app/icon.svg"
            npx --yes @tauri-apps/cli icon app/icon.svg
          fi

      - name: Prepare Tauri signing secrets
        shell: bash
        env:
          TAURI_SIGNING_PRIVATE_KEY_SECRET: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD_SECRET: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: |
          python - <<'PY'
          import os
          import sys

          key = os.environ.get("TAURI_SIGNING_PRIVATE_KEY_SECRET", "")
          password = os.environ.get("TAURI_SIGNING_PRIVATE_KEY_PASSWORD_SECRET", "")

          if not key or not password:
              print("::warning::TAURI signing skipped: TAURI_SIGNING_PRIVATE_KEY/TAURI_SIGNING_PRIVATE_KEY_PASSWORD not both set.")
              with open(os.environ["GITHUB_ENV"], "a", encoding="utf-8") as fh:
                  fh.write("TAURI_CONFIG={\"bundle\":{\"createUpdaterArtifacts\":false},\"plugins\":{\"updater\":{\"active\":false,\"pubkey\":\"\"}}}\n")
              sys.exit(0)

          # Normalize line endings and any literal \n escapes that may have
          # crept in when the secret was pasted, then strip surrounding
          # whitespace. Tauri expects the raw base64 string (NOT a file path,
          # and NOT with a trailing newline) when the value is passed inline.
          key = key.replace("\r\n", "\n").replace("\r", "\n")
          if "\n" not in key and "\\n" in key:
              key = key.replace("\\n", "\n")
          key = key.strip()

          with open(os.environ["GITHUB_ENV"], "a", encoding="utf-8") as fh:
              fh.write("TAURI_CONFIG={}\n")
              fh.write("TAURI_SIGNING_PRIVATE_KEY<<EOF\n")
              fh.write(key)
              fh.write("\nEOF\n")
              fh.write("TAURI_SIGNING_PRIVATE_KEY_PASSWORD<<EOF\n")
              fh.write(password)
              fh.write("\nEOF\n")
          PY

      - name: Build & publish to rolling `nightly` release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_CONFIG: ${{ env.TAURI_CONFIG }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ env.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ env.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: nightly
          releaseName: 'Verto nightly (main)'
          releaseBody: |
            Automated build from the latest `main` branch.

            Commit: ${{ github.sha }}

            ⚠️ This is an unstable rolling build — use the tagged
            releases for production. Assets here are overwritten on
            every push to `main`.
          releaseDraft: false
          prerelease: true
          includeUpdaterJson: ${{ env.TAURI_SIGNING_PRIVATE_KEY != '' }}
          updaterJsonPreferNsis: true
          args: ${{ matrix.args }}
