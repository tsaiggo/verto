# Build the Verto desktop app for macOS / Windows / Linux on every push
# to `main` and publish the installers to a rolling GitHub prerelease
# tagged `nightly`. This gives anyone a stable download URL pointing to
# the latest main build, e.g.
# https://github.com/<owner>/<repo>/releases/download/nightly/<asset>
#
# Tag/`v*` builds are handled by release.yml — this workflow is only
# for the rolling "latest main" channel and never touches versioned
# releases.
#
# Notes:
# - We reuse the same TAURI_SIGNING_* secrets as release.yml so the
#   in-app updater can still verify nightly bundles if you ever point
#   it at this channel. If the secrets are not set the build still
#   succeeds, the bundles just won't be signed.
# - Docs-only / content-only changes are skipped via `paths-ignore`.
# - `concurrency` cancels an in-flight nightly when a newer commit
#   lands on main, so we don't waste runner minutes on stale SHAs.

name: nightly

on:
  push:
    branches:
      - main
    paths-ignore:
      - '**/*.md'
      - 'docs/**'
      - 'content/**'
      - '.gitignore'
      - 'LICENSE'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: nightly-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: build (${{ matrix.platform }} ${{ matrix.args }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest # Apple silicon
            args: '--target aarch64-apple-darwin'
          - platform: macos-latest # Intel
            args: '--target x86_64-apple-darwin'
          - platform: ubuntu-22.04
            args: ''
          - platform: windows-latest
            args: ''

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux build deps
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable
        with:
          # Build both arches on macOS, otherwise the host target.
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Cache cargo
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install JS deps
        run: npm ci

      - name: Generate placeholder icons if none committed
        shell: bash
        run: |
          if [ ! -f src-tauri/icons/icon.ico ]; then
            echo "No icons checked in — generating from app/icon.svg"
            npx --yes @tauri-apps/cli icon app/icon.svg
          fi

      - name: Prepare Tauri signing secrets
        shell: bash
        env:
          TAURI_SIGNING_PRIVATE_KEY_SECRET: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD_SECRET: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: |
          python - <<'PY'
          import os
          import pathlib
          import sys
          import tempfile

          key = os.environ.get("TAURI_SIGNING_PRIVATE_KEY_SECRET", "")
          password = os.environ.get("TAURI_SIGNING_PRIVATE_KEY_PASSWORD_SECRET", "")

          if not key or not password:
              print("::warning::TAURI signing skipped: TAURI_SIGNING_PRIVATE_KEY/TAURI_SIGNING_PRIVATE_KEY_PASSWORD not both set.")
              sys.exit(0)

          key = key.replace("\r\n", "\n").replace("\r", "\n")
          if "\n" not in key and "\\n" in key:
              key = key.replace("\\n", "\n")

          fd, key_path_raw = tempfile.mkstemp(
              prefix="tauri-signing-private-",
              suffix=".key",
              dir=os.environ["RUNNER_TEMP"],
              text=True,
          )
          key_path = pathlib.Path(key_path_raw)
          try:
              os.chmod(key_path, 0o600)
          except OSError as exc:
              print(f"::warning::Unable to restrict permissions on {key_path}: {exc}")
          with os.fdopen(fd, "w", encoding="utf-8") as key_file:
              # Tauri's signer expects the secret key file to end with a single newline.
              key_file.write(key.rstrip("\n") + "\n")

          with open(os.environ["GITHUB_ENV"], "a", encoding="utf-8") as fh:
              fh.write(f"TAURI_SIGNING_PRIVATE_KEY_PATH={key_path.as_posix()}\n")
              fh.write("TAURI_SIGNING_PRIVATE_KEY_PASSWORD<<EOF\n")
              fh.write(password)
              fh.write("\nEOF\n")
          PY

      - name: Build & publish to rolling `nightly` release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY_PATH: ${{ env.TAURI_SIGNING_PRIVATE_KEY_PATH }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ env.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: nightly
          releaseName: 'Verto nightly (main)'
          releaseBody: |
            Automated build from the latest `main` branch.

            Commit: ${{ github.sha }}

            ⚠️ This is an unstable rolling build — use the tagged
            releases for production. Assets here are overwritten on
            every push to `main`.
          releaseDraft: false
          prerelease: true
          includeUpdaterJson: true
          updaterJsonPreferNsis: true
          args: ${{ matrix.args }}

      - name: Remove temporary Tauri signing key
        if: ${{ always() && env.TAURI_SIGNING_PRIVATE_KEY_PATH != '' }}
        shell: bash
        run: rm -f -- "$TAURI_SIGNING_PRIVATE_KEY_PATH"
