# Build the Verto desktop app for macOS / Windows / Linux on every push
# to `main` and publish the installers to a rolling GitHub prerelease
# tagged `nightly`. This gives anyone a stable download URL pointing to
# the latest main build, e.g.
# https://github.com/<owner>/<repo>/releases/download/nightly/<asset>
#
# Tag/`v*` builds are handled by release.yml — this workflow is only
# for the rolling "latest main" channel and never touches versioned
# releases.
#
# Notes:
# - We reuse the same TAURI_SIGNING_* secrets as release.yml so the
#   in-app updater can still verify nightly bundles if you ever point
#   it at this channel. If the secrets are not set the build still
#   succeeds, the bundles just won't be signed.
# - Docs-only / content-only changes are skipped via `paths-ignore`.
# - `concurrency` cancels an in-flight nightly when a newer commit
#   lands on main, so we don't waste runner minutes on stale SHAs.

name: nightly

on:
  push:
    branches:
      - main
    paths-ignore:
      - '**/*.md'
      - 'docs/**'
      - 'content/**'
      - '.gitignore'
      - 'LICENSE'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: nightly-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: build (${{ matrix.platform }} ${{ matrix.args }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest # Apple silicon
            args: '--target aarch64-apple-darwin'
          - platform: macos-latest # Intel
            args: '--target x86_64-apple-darwin'
          - platform: ubuntu-22.04
            args: ''
          - platform: windows-latest
            args: ''

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux build deps
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable
        with:
          # Build both arches on macOS, otherwise the host target.
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Cache cargo
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install JS deps
        run: npm ci

      - name: Generate placeholder icons if none committed
        shell: bash
        run: |
          if [ ! -f src-tauri/icons/icon.ico ]; then
            echo "No icons checked in — generating from app/icon.svg"
            npx --yes @tauri-apps/cli icon app/icon.svg
          fi

      - name: Normalize Tauri signing secrets
        shell: bash
        env:
          TAURI_SIGNING_PRIVATE_KEY_SECRET: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD_SECRET: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: |
          if [ -z "$TAURI_SIGNING_PRIVATE_KEY_SECRET" ] || [ -z "$TAURI_SIGNING_PRIVATE_KEY_PASSWORD_SECRET" ]; then
            echo "::warning::TAURI signing skipped: TAURI_SIGNING_PRIVATE_KEY/TAURI_SIGNING_PRIVATE_KEY_PASSWORD not both set."
            exit 0
          fi
          python <<'PY'
          import base64
          import binascii
          import os
          import sys

          def normalize(value: str) -> str:
              value = value.replace("\\r\\n", "\n").replace("\\n", "\n").replace("\\r", "")
              return value.replace("\r\n", "\n").replace("\r", "").strip()

          def looks_like_minisign_key(value: str) -> bool:
              lines = value.splitlines()
              return len(lines) >= 2 and lines[0].startswith("untrusted comment:")

          key = normalize(os.environ["TAURI_SIGNING_PRIVATE_KEY_SECRET"])

          if not looks_like_minisign_key(key):
              compact = key.replace("\n", "").replace(" ", "").replace("\t", "")
              try:
                  decoded = base64.b64decode(compact, validate=True).decode("utf-8")
              except (binascii.Error, ValueError, UnicodeDecodeError):
                  decoded = ""

              decoded = normalize(decoded)
              if looks_like_minisign_key(decoded):
                  key = decoded

          if not looks_like_minisign_key(key):
              print(
                  "::error::TAURI_SIGNING_PRIVATE_KEY is not a valid minisign secret key. "
                  "Store either the raw key file contents or a base64-encoded copy of that file.",
                  file=sys.stderr,
              )
              raise SystemExit(1)

          password = os.environ["TAURI_SIGNING_PRIVATE_KEY_PASSWORD_SECRET"].replace("\r", "")

          with open(os.environ["GITHUB_ENV"], "a", encoding="utf-8") as env_file:
              env_file.write("TAURI_SIGNING_PRIVATE_KEY<<EOF\n")
              env_file.write(f"{key}\n")
              env_file.write("EOF\n")
              env_file.write("TAURI_SIGNING_PRIVATE_KEY_PASSWORD<<EOF\n")
              env_file.write(f"{password}\n")
              env_file.write("EOF\n")
          PY

      - name: Build & publish to rolling `nightly` release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ env.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ env.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: nightly
          releaseName: 'Verto nightly (main)'
          releaseBody: |
            Automated build from the latest `main` branch.

            Commit: ${{ github.sha }}

            ⚠️ This is an unstable rolling build — use the tagged
            releases for production. Assets here are overwritten on
            every push to `main`.
          releaseDraft: false
          prerelease: true
          includeUpdaterJson: true
          updaterJsonPreferNsis: true
          args: ${{ matrix.args }}
